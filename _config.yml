theme: jekyll-theme-chirpy

# ====================
# Site Settings
# ====================
lang: en
timezone: Asia/Seoul

title: Jangkyu Ju
tagline: Research Engineer & Data Scientist | Human-AI Interaction & HCI
description: >-
  Research Engineer & Data Scientist at Hyundai Motor Group.
  Working across human-AI interaction, visual cognition, user behavior analytics,
  adaptive interfaces, and automotive UX.

# GitHub Pages URL - update before deploying
# For username.github.io repo: url = "https://USERNAME.github.io", baseurl = ""
# For project repo: url = "https://USERNAME.github.io", baseurl = "/REPO-NAME"
url: "https://jangkyuju.github.io"
baseurl: ""

# ====================
# Social / Profile
# ====================
github:
  username: jangkyuju

social:
  name: Jangkyu Ju
  email: ju.jk.psych@gmail.com
  links:
    - https://www.linkedin.com/in/jangkyu-ju-99666724a/
    - https://github.com/jangkyuju
    - https://scholar.google.com/citations?user=qA_-6TQAAAAJ

# Add a real image path when a profile photo is available.
avatar:
social_preview_image: /assets/img/social-preview.png

# ====================
# Theme Settings
# ====================
# The site is intentionally light-only.
theme_mode: light

# Sidebar (Chirpy default) - we override with top navbar in _layouts/default.html
# Keep these for SEO / meta purposes
icon:

# ====================
# Analytics
# ====================
analytics:
  google:
    id: "G-JQ6PJW9F7H"   # Replace with your GA4 Measurement ID (e.g., G-XXXXXXXXXX)

# ====================
# Comments (disabled)
# ====================
comments:
  provider: ""

# ====================
# Blog Settings (Chirpy)
# ====================
paginate: 5

# Blog categories
# (defined via post front matter)

# Table of Contents
toc: true

# ====================
# Markdown & Syntax
# ====================
markdown: kramdown
highlighter: rouge

kramdown:
  input: GFM
  syntax_highlighter: rouge
  syntax_highlighter_opts:
    css_class: highlight
    span:
      line_numbers: false
    block:
      line_numbers: true

# ====================
# Collections & Defaults
# ====================
include:
  - _pages

collections:
  tabs:
    output: true
    sort_by: order

defaults:
  - scope:
      path: ""
      type: posts
    values:
      layout: blog-doc
      comments: false
      toc: true
      math: false
      mermaid: false
  - scope:
      path: _pages
      type: pages
    values:
      layout: page

# ====================
# Assets & Compression
# ====================
sass:
  style: compressed

compress_html:
  clippings: all
  comments: all
  endings: all
  profile: false
  blanklines: false
  ignore:
    envs: development

# ====================
# Plugins
# ====================
plugins:
  - jekyll-sitemap
  - jekyll-seo-tag

# ====================
# Exclude from build
# ====================
exclude:
  - "*.gem"
  - "*.gemspec"
  - docs
  - output
  - tools
  - README.md
  - LICENSE
  - "*.zip"
  - package.json
  - DEVELOPMENT.md
  - scripts
  - agent-design.md
  - CLAUDE.md
  - .claude
  - vendor
  - node_modules
  - SUMMARY.md
