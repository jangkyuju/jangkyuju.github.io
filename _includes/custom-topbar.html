<!-- Top Navigation Bar -->
<nav class="site-topbar" role="navigation" aria-label="Main navigation">
  <div class="topbar-inner">

    <!-- Nav Links -->
    <div class="topbar-nav" id="topbar-nav">
      <a href="{{ '/' | relative_url }}"
         class="{% if page.url == '/' %}active{% endif %}">Home</a>
      <a href="{{ '/publications' | relative_url }}"
         class="{% if page.url contains '/publications' %}active{% endif %}">Publications</a>
      <a href="{{ '/analytics' | relative_url }}"
         class="{% if page.url contains '/analytics' %}active{% endif %}">Analytics</a>
      <a href="{{ '/cv' | relative_url }}"
         class="{% if page.url contains '/cv' %}active{% endif %}">CV</a>
      <a href="{{ '/contact' | relative_url }}"
         class="{% if page.url contains '/contact' %}active{% endif %}">Contact</a>
    </div>

    <!-- Right actions -->
    <div class="topbar-actions">

      <!-- CV Download button -->
      {% if site.data.profile.cv_pdf %}
      <a href="{{ site.data.profile.cv_pdf }}" target="_blank" rel="noopener noreferrer"
         class="btn-cv topbar-cv-btn" aria-label="Download CV">
        <svg xmlns="http://www.w3.org/2000/svg" width="14" height="14" viewBox="0 0 24 24"
             fill="none" stroke="currentColor" stroke-width="2"
             stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
          <polyline points="7 10 12 15 17 10"/>
          <line x1="12" y1="15" x2="12" y2="3"/>
        </svg>
        <span class="topbar-cv-label">CV</span>
      </a>
      {% endif %}

      <!-- Mobile hamburger -->
      <button class="topbar-mobile-toggle" id="mobile-toggle" aria-label="Open navigation menu"
              aria-controls="topbar-nav" aria-expanded="false">
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24"
             viewBox="0 0 24 24" fill="none" stroke="currentColor"
             stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="3" y1="12" x2="21" y2="12"/>
          <line x1="3" y1="6" x2="21" y2="6"/>
          <line x1="3" y1="18" x2="21" y2="18"/>
        </svg>
      </button>

    </div>
  </div>
</nav>

<!-- Mobile navigation -->
<script>
  // Mobile nav
  (function() {
    var toggle = document.getElementById('mobile-toggle');
    var nav = document.getElementById('topbar-nav');

    function setOpen(isOpen) {
      nav.classList.toggle('open', isOpen);
      toggle.setAttribute('aria-expanded', String(isOpen));
      toggle.setAttribute('aria-label', isOpen ? 'Close navigation menu' : 'Open navigation menu');
    }

    toggle.addEventListener('click', function() {
      setOpen(toggle.getAttribute('aria-expanded') !== 'true');
    });

    nav.addEventListener('click', function(event) {
      if (event.target.closest('a')) setOpen(false);
    });

    document.addEventListener('keydown', function(event) {
      if (event.key === 'Escape') {
        setOpen(false);
        toggle.focus();
      }
    });
  })();
</script>
