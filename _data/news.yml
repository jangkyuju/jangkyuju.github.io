# News items are displayed in this order on the homepage.
# Entries are based on the site CV or details provided directly by the site owner.

- date: "Jul 2026"
  content: >
    My role at Hyundai Motor Group concludes. I look forward to beginning the next stage of my academic career at Georgia Tech!

- date: "Mar 2026"
  content: >
    I accepted an offer of admission to the Ph.D. program at the Georgia Institute of Technology (Georgia Tech).

- date: "Sep 2024"
  content: >
    Our paper on developing machine-learning models for personalized in-vehicle infotainment recommendation systems was published in the ACM AutomotiveUI 2024 Adjunct Proceedings.

- date: "Sep 2024"
  content: >
    Presented our research on personalized in-vehicle infotainment recommendation system at ACM AutomotiveUI 2024 in Stanford, California.

- date: "Jul 2024"
  content: >
    Our article on how automotive head-up display complexity modulates attentional tunneling was published in Human Factors.

- date: "Oct 2023"
  content: >
    Our computational simulation analysis of value-driven attention and associative learning models was published in Psychonomic Bulletin & Review.

- date: "Feb 2023"
  content: >
    I earned my M.S. in Behavioral and Cognitive Neuroscience from Korea University and joined Hyundai Motor Group as a Research Engineer.

- date: "Feb 2023"
  content: >
    Our article on exploration for reward information and value-driven attentional capture was published in the Journal of Experimental Psychology: Learning, Memory, and Cognition.

- date: "Nov 2022"
  content: >
    Presented research on reward predictiveness and uncertainty at the 63rd Annual Meeting of the Psychonomic Society in Boston.

- date: "Jul 2022"
  content: >
    Presented research on automotive head-up display (HUD) complexity and attentional tunneling at AHFE 2022.

- date: "Feb 2022"
  content: >
    Presented two studies at the Korean Society of Cognitive and Biological Psychology; our study on the visual complexity of head-up display (HUD) and human attention received an Outstanding Presentation Award.

- date: "Nov 2021"
  content: >
    Presented research on reward information and value-driven attentional capture at the 62nd Annual Meeting of the Psychonomic Society.

- date: "Jul 2021"
  content: >
    Presented research on how reward information entropy and variance modulate human visual attention at the Korean Society of Cognitive and Biological Psychology.
